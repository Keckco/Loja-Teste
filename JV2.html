<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>Teste</title>
    <script>
        let quebro = false;
        function mudalampada(tipo) {
            if (!quebro) {
                document.getElementById("luz").src = "_imagens/" + tipo + ".jpg";
                if (tipo === "lampada-quebrada") {
                    quebro = true;
                }
            }
        }
    </script>
</head>
<body>
<h1>Acenda Lâmpada</h1>
<img src="_imagens/lampada-apagada.jpg" id="luz" onmouseover="mudalampada('lampada-acesa')" onmouseout="mudalampada('lampada-apagada')" onclick="mudalampada('lampada-quebrada')" alt="">
</body>
