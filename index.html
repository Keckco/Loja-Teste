<head>
<meta charset="UTF-8">
<title> Loja </title>
<style>
header {background-color:#111;color:white;padding:15px}
main {max-width:1000px;margin:20px auto;display:flex;justify-content:center;gap:10px;flex-wrap:wrap;padding:20px;align-items:flex-start}
body {background-color:#f4f4f4;text-align:center;font-family: Arial, sans-serif;}
.produto {overflow:hidden;text-align:left;display:flex;width:200px;gap:10px;padding:15px;background-color:white;border-radius:12px;box-shadow: 0 4px 10px rgba(0,0,0,0.1);flex-direction:column;align-items:flex-start;transition:transform 0.3s,box-shadow 0.3s}
.produto:hover {transform: translateY(-5px) scale(1.05);box-shadow: 0 4px 20px rgba(0,0,0,0.2)}
.botao-comprar {display:block;width:100%;padding:10px;margin-top:10px;color:white;text-decoration:none;border-radius:5px;transition:background-color 0.3s, box-shadow 0.3s;text-align:center;background-color:#111;}
.botao-comprar:hover {transform: translateY(-2px);background-color:#444;box-shadow: 0 4px 10px rgba(0,0,0,0.2)}
.descricao {color:#333;font-weight:bold}
.categoria {display:inline-block;font-weight:bold;color:#777;font-size:0.8rem;background:#eee;padding: 3px 8px;border-radius: 5px}
.preco {font-size: 1.4rem;font-weight:bold;transition: transform 0.3s;color:#ff6600}
.preco:hover {transform: scale(1.1)}
.produto p {margin:5px 0;}
.produto img {width:100%;border-radius:10px;transition: transform 0.3s;object-fit:cover;height:150px}
.produto:hover img {transform: scale(1.1);}
h2 {margin-bottom:5px}
@media (max-width: 600px) {
  main {
    flex-direction: column;
    align-items: center;
  }

  .produto {
    width: 90%;
  }
}
</style>
</head>
